server:
  port: 8848
  servlet:
    context-path: /api
spring:
  application:
    name: huan-ai-helper-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
#  ai:
#    mcp:
#      client:
#        stdio:
#          servers-configuration: classpath:mcp-servers.json
  profiles:
    active: local
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.huan.aihelper.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
